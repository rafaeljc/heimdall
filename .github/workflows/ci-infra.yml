name: Infrastructure CI

on:
  pull_request:
    branches: [ "main" ]
    # Only trigger when infrastructure files change
    paths:
      - 'infra/**'
      - '.github/workflows/ci-infra.yml'

jobs:
  terraform-validate:
    name: Validate Terraform Code
    runs-on: ubuntu-latest
    # Terraform validation includes: formatting, linting, syntax validation, and security scanning.
    # All checks must pass before PR can be merged.
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        # Installs latest Terraform compatible with Ubuntu runner

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugins
            infra/terraform/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('infra/terraform/**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-
        # Caches plugins and .terraform directories to speed up subsequent runs
        # Cache key includes hash of .terraform.lock.hcl to invalidate on dependency changes

      - name: Enforce Terraform Formatting
        working-directory: infra/terraform
        # Ensures all Terraform code follows the official style guide (terraform fmt)
        # This promotes consistency and prevents formatting-only commits
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        # Installs TFLint using the official action for reliability and maintenance

      - name: Terraform Linting with TFLint
        working-directory: infra/terraform
        # TFLint checks for common mistakes, unused variables, and best practices
        # Examples: unreachable code, unused locals, deprecated attributes
        # See: https://github.com/terraform-linters/tflint
        run: |
          set -eo pipefail
          tflint --init
          echo "Running TFLint checks..."
          tflint --format compact || exit 1

      - name: Validate All Terraform Modules and Layers
        # Core validation step: checks syntax and module structure across all Terraform code
        # Dynamically discovers all .tf files and validates each directory independently
        # Uses -backend=false for security: validates without AWS credentials or remote state access
        run: |
          # Abort the script immediately on any command failure
          set -eo pipefail
          
          echo "Scanning for Terraform directories..."
          validation_errors=0
          # Dynamically finds all directories containing .tf files
          for dir in $(find infra/terraform -type f -name "*.tf" -exec dirname {} \; | sort -u); do
            echo "------------------------------------------------"
            echo "Validating Terraform directory: $dir"
            cd "$dir"
            
            # Security and Speed: -backend=false validates syntax and modules locally 
            # WITHOUT needing actual AWS credentials or touching the remote state.
            if ! terraform init -backend=false; then
              echo "Failed to initialize: $dir"
              ((validation_errors++))
              cd - > /dev/null
              continue
            fi
            
            if ! terraform validate; then
              echo "Validation failed: $dir"
              ((validation_errors++))
              cd - > /dev/null
              continue
            fi
            
            echo "Validated: $dir"
            cd - > /dev/null
          done
          
          if [ $validation_errors -gt 0 ]; then
            echo ""
            echo "Terraform validation completed with $validation_errors error(s)"
            exit 1
          fi
          echo ""
          echo "All Terraform modules validated successfully"

      - name: Terraform Security Scan with Checkov
        working-directory: infra/terraform
        # Checkov performs static analysis to detect misconfigurations and security issues
        # Checks for: exposed credentials, insecure defaults, encryption requirements, IAM policies
        # Examples: unencrypted databases, public S3 buckets, missing resource tags
        # See: https://www.checkov.io/
        run: |
          set -eo pipefail
          pip install checkov --quiet
          echo "Running Checkov security scan..."
          checkov -d . --framework terraform --compact || exit 1

  gitops-validate:
    name: Validate GitOps Manifests
    runs-on: ubuntu-latest
    # GitOps validation ensures Kustomize overlays and Kubernetes manifests are valid
    # Validates configuration syntax, resource structure, and API schema compliance
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.3.0"
        # Installs pinned Kustomize version (5.3.0) for reproducible builds

      - name: Cache Kustomize
        uses: actions/cache@v4
        with:
          path: ~/.cache/kustomize
          key: ${{ runner.os }}-kustomize-${{ hashFiles('infra/gitops/**/kustomization.yaml') }}
          restore-keys: |
            ${{ runner.os }}-kustomize-
        # Caches downloaded resources and dependencies referenced in kustomization.yaml files
        # Cache key includes hash of all kustomization.yaml files

      - name: Build and Validate Kustomize Configurations
        # Builds all Kustomize overlays to validate structure and resolve patch references
        # Detects: broken file paths, missing bases, invalid resource references, syntax errors
        # Failed builds indicate configuration errors that would fail deployment
        run: |
          set -eo pipefail
          
          echo "Scanning for Kustomize overlays..."
          validation_errors=0
          # Dynamically finds every kustomization.yaml in the GitOps folder
          for kustomization in $(find infra/gitops -type f -name "kustomization.yaml"); do
            dir=$(dirname "$kustomization")
            echo "------------------------------------------------"
            echo "Building Kustomize directory: $dir"
            
            # The build will fail (and block the PR) if there are syntax errors,
            # broken file paths, or invalid resource references.
            if ! kustomize build "$dir" > /dev/null 2>&1; then
              echo "Build failed: $dir"
              kustomize build "$dir"  # Re-run to show error details
              ((validation_errors++))
              continue
            fi
            
            echo "Built: $dir"
          done
          
          if [ $validation_errors -gt 0 ]; then
            echo ""
            echo "Kustomize validation completed with $validation_errors error(s)"
            exit 1
          fi
          echo ""
          echo "All Kustomize configurations validated successfully"

      - name: Validate Kubernetes Manifests with Kubeconform
        # Final validation step: checks generated manifests against Kubernetes OpenAPI schema
        # Validates: API versions, required fields, resource constraints, label/annotation format
        # Ensures manifests can be applied to the cluster without API rejections
        # See: https://github.com/yannh/kubeconform
        run: |
          set -eo pipefail
          echo "Installing kubeconform..."
          mkdir -p /tmp/kubeconform && cd /tmp/kubeconform
          wget -q https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xzf kubeconform-linux-amd64.tar.gz
          
          echo "Validating Kubernetes manifests..."
          validation_errors=0
          for kustomization in $(find "$GITHUB_WORKSPACE/infra/gitops" -type f -name "kustomization.yaml"); do
            dir=$(dirname "$kustomization")
            echo "Validating Kubernetes manifests in: $dir"
            if ! kustomize build "$dir" | /tmp/kubeconform/kubeconform -summary -ignore-missing-schemas -; then
              echo "Validation failed: $dir"
              ((validation_errors++))
              continue
            fi
          done
          
          if [ $validation_errors -gt 0 ]; then
            echo ""
            echo "Kubeconform validation completed with $validation_errors error(s)"
            exit 1
          fi
          echo ""
          echo "All Kubernetes manifests validated successfully"
