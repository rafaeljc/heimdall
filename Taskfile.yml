
version: '3'

vars:
  BIN_DIR: bin
  PROTO_DIR: proto
  VERSION:
    sh: git rev-parse --short HEAD

tasks:
  default:
    desc: Lists available tasks
    cmds:
      - task --list

  # --- INFRASTRUCTURE (infra:*) ---
  infra:bootstrap:
    desc: "Initialize Heimdall bootstrap layer (one-time setup)"
    dir: infra/terraform/bootstrap
    cmds:
      - chmod +x setup.sh
      - ./setup.sh

  infra:gitops:bootstrap:
    desc: "Initialize ArgoCD and deploy GitOps root application (one-time setup)"
    dir: infra/gitops/bootstrap
    cmds:
      - chmod +x setup.sh
      - ./setup.sh

  # --- DEVELOPMENT WORKFLOW (dev:*) ---
  dev:up:
    desc: Starts the local environment (builds images and starts containers)
    cmds:
      # build ensures that if you change main.go, the image is recreated
      - docker compose up -d --build
      - echo "Heimdall environment is running!"
      - 'echo "Control API:         localhost:8080"'
      - 'echo "Data Plane gRPC:     localhost:50051"'
      - 'echo "Swagger UI:          localhost:8081"'
      - 'echo "Observability (control): localhost:9090"'
      - 'echo "Observability (data):    localhost:9091"'
      - 'echo "Observability (syncer):  localhost:9092"'

  dev:down:
    desc: Stops the local environment (stops containers and removes networks)
    cmds:
      - docker compose down
      - echo "Environment stopped."

  dev:reset:
    desc: Destroys ALL data volumes (Clean Start)
    cmds:
      - docker compose down -v
      - echo "Destroyed all data volumes. Run 'task dev:up' to start fresh."

  dev:logs:
    desc: Tails logs from all running services
    cmds:
      - docker compose logs -f
  
  # --- QUALITY & TESTING (check:* / test:*) ---
  check:lint:
    desc: Runs golangci-lint
    cmds:
      - golangci-lint run ./...

  test:unit:
    desc: Runs unit tests
    cmds:
      - go test ./... -v

  test:integration:
    desc: Runs integration tests
    cmds:
      - go test ./... -v -tags=integration

  # --- BUILD (build:*) ---
  build:local:
    desc: Builds all Go binaries locally to /bin
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/heimdall-control ./cmd/heimdall-control
      - go build -o {{.BIN_DIR}}/heimdall-data ./cmd/heimdall-data
      - go build -o {{.BIN_DIR}}/heimdall-syncer ./cmd/heimdall-syncer
    sources:
      - ./**/*.go

  build:docker:
    internal: true
    deps: [tidy:deps, check:lint, test:unit, test:integration, build:local]
    cmds:
      - docker build -t heimdall-{{.SERVICE}}:{{.VERSION}} --build-arg SERVICE_NAME={{.SERVICE}} --build-arg VERSION={{.VERSION}} .
  
  build:docker:control:
    desc: Builds Docker image for Control Plane
    cmds:
      - task: build:docker
        vars:
          SERVICE: control

  build:docker:data:
    desc: Builds Docker image for Data Plane
    cmds:
      - task: build:docker
        vars:
          SERVICE: data

  build:docker:syncer:
    desc: Builds Docker image for Syncer
    cmds:
      - task: build:docker
        vars:
          SERVICE: syncer

  build:docker:all:
    desc: Builds Docker images for all services
    cmds:
      - task build:docker:control
      - task build:docker:data
      - task build:docker:syncer

  # --- CODE GENERATION (generate:*) ---
  generate:proto:
    desc: "Lint protobuf definitions and generate code for Go (Backend) and Node.js (SDK)."
    cmds:
      # Ensure style compliance
      - buf lint proto
      
      # Clean up old artifacts to prevent stale files
      - find proto -name "*.pb.go" -type f -delete || true
      - rm -rf sdks/node/src/generated/* || true
      
      # Generate code based on buf.gen.yaml configuration
      - buf generate --template buf.gen.yaml proto
    sources:
      - proto/**/*.proto
    generates:
      - proto/**/*.pb.go
      - sdks/node/src/generated/**/*.js
    # Task caches automatically. Use 'task generate:proto --force' to rebuild without source changes.

  # --- SECURITY (sec:*) ---
  sec:genkey:
    desc: Generates a secure random API key (32 bytes, base64-encoded)
    silent: true
    cmds:
      - |
        set +o history 2>/dev/null || true  # Disable history logging
        set +x  # Disable command echoing
        KEY=$(openssl rand -base64 32)
        HASH=$(printf '%s' "$KEY" | sha256sum | cut -d' ' -f1)
        
        printf "\n"
        printf "===================================================================\n"
        printf "           HEIMDALL API KEY - STORE SECURELY\n"
        printf "===================================================================\n"
        printf "\n"
        printf "API Key (use in Authorization header):\n"
        printf "%s\n" "$KEY"
        printf "\n"
        printf "-------------------------------------------------------------------\n"
        printf "\n"
        printf "SHA-256 Hash (set as API_KEY_HASH env var):\n"
        printf "%s\n" "$HASH"
        printf "\n"
        printf "===================================================================\n"
        printf "SECURITY NOTICE:\n"
        printf "  - Store the API Key in a secure location (password manager)\n"
        printf "  - Set API_KEY_HASH in your environment/secrets manager\n"
        printf "  - Never commit the key or hash to version control\n"
        printf "  - This information will not be displayed again\n"
        printf "===================================================================\n"
        printf "\n"
        
        # Clear sensitive variables from memory
        unset KEY HASH
        set -o history 2>/dev/null || true  # Re-enable history

  sec:hash:
    desc: Computes SHA-256 hash for an existing API key
    silent: true
    cmds:
      - |
        set +o history 2>/dev/null || true  # Disable history logging
        set +x  # Disable command echoing
        
        # Prompt for API key without echoing to terminal
        printf "Enter API Key: " >&2
        read -rs KEY
        printf "\n" >&2
        
        if [ -z "$KEY" ]; then
          printf "Error: API key cannot be empty\n" >&2
          exit 1
        fi
        
        HASH=$(printf '%s' "$KEY" | sha256sum | cut -d' ' -f1)
        
        printf "\n"
        printf "SHA-256 Hash (set as API_KEY_HASH env var):\n"
        printf "%s\n" "$HASH"
        printf "\n"
        
        # Clear sensitive variables from memory
        unset KEY HASH
        set -o history 2>/dev/null || true  # Re-enable history

  # --- DEPENDENCY MANAGEMENT (tidy:*) ---
  tidy:deps:
    desc: Runs go mod tidy forcing Go 1.24 compatibility
    cmds:
      - go mod tidy -go=1.24.0
