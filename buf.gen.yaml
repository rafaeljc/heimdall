version: v1
managed:
  enabled: true
  go_package_prefix:
    default: github.com/rafaeljc/heimdall
    except:
      - buf.build/googleapis/googleapis

plugins:
  # ============================================================================
  # Backend Generation (Go)
  # ============================================================================
  - plugin: buf.build/protocolbuffers/go:v1.32.0
    out: proto
    opt: paths=source_relative
  - plugin: buf.build/grpc/go:v1.3.0
    out: proto
    opt: paths=source_relative

  # ============================================================================
  # SDK Generation (Node.js/TypeScript)
  # ============================================================================
  #
  - plugin: buf.build/community/stephenh-ts-proto:v2.11.2
    out: sdks/node/src/generated
    opt:
      # Generate definitions compatible with grpc-js
      - outputServices=grpc-js
      # Guarantee import compatibility between CommonJS and ES Modules
      - esModuleInterop=true
      # Use string enums for better debugging
      - stringEnums=true
      # Disable generation of unnecessary methods
      - outputJsonMethods=false
