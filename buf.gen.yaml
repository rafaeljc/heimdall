version: v1
managed:
  enabled: true
  # Configures how Go packages are managed. 
  # This ensures consistent import paths across the backend.
  go_package_prefix:
    default: github.com/rafaeljc/heimdall
    except:
      - buf.build/googleapis/googleapis

plugins:
  # ============================================================================
  # Backend Generation (Go)
  # ============================================================================
  - plugin: buf.build/protocolbuffers/go:v1.32.0
    out: proto
    opt: paths=source_relative
  - plugin: buf.build/grpc/go:v1.3.0
    out: proto
    opt: paths=source_relative

  # ============================================================================
  # SDK Generation (Node.js)
  # ============================================================================
  # Generates the gRPC service clients using the purely JS implementation (@grpc/grpc-js).
  - plugin: buf.build/grpc/node:v1.12.0
    out: sdks/node/src/generated
    opt: grpc_js

  # Generates the Protocol Buffer message objects (Request/Response types).
  # We use CommonJS to maintain compatibility with standard Node.js tooling.
  - plugin: buf.build/protocolbuffers/js:v3.21.2
    out: sdks/node/src/generated
    opt: import_style=commonjs,binary
