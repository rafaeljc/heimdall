apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

resources:
  - certificate.yaml
  - cluster-secret-store.yaml
  - external-secret.yaml
  - migration-job.yaml
  - service-public.yaml

patches:
  - path: deployment-patch.yaml

# Kustomize appends a hash to the ConfigMap name. 
# Changing these values will automatically trigger a rolling restart of the pods.
configMapGenerator:
  - name: heimdall-control-plane-config
    literals:
      - HEIMDALL_APP_ENV=production
      - HEIMDALL_APP_LOG_LEVEL=info
      - HEIMDALL_APP_LOG_FORMAT=json
      - HEIMDALL_DB_SSL_MODE=require
      - HEIMDALL_REDIS_TLS_ENABLED=true
      # Enforce TLS on the Control Plane API
      - HEIMDALL_SERVER_CONTROL_TLS_ENABLED=true
      - HEIMDALL_SERVER_CONTROL_TLS_CERT_PATH=/etc/heimdall/certs/tls.crt
      - HEIMDALL_SERVER_CONTROL_TLS_KEY_PATH=/etc/heimdall/certs/tls.key
  # Deterministic Migration Mount: Transforms the SQL files into a ConfigMap.
  # Security Note: We use an explicit allowlist rather than directory inclusion
  # to prevent accidental execution of temporary or backup files.
  - name: heimdall-db-migrations
    files:
      - ../../../../../../migrations/001_init_schema.sql
      - ../../../../../../migrations/002_add_rules_and_version.up.sql
      - ../../../../../../migrations/003_add_soft_delete_and_unique_indexes.up.sql
      # FUTURE MIGRATIONS: Must be explicitly appended to this list by developers.
